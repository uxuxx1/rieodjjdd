<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>global chat</title>
    <style>
        /* блокируем скролл всего экрана полностью */
        html, body { 
            margin: 0; 
            padding: 0; 
            width: 100%; 
            height: 100%; 
            overflow: hidden; 
            background: #ffffff; 
            font-family: sans-serif; 
            color: #000000;
            -webkit-text-size-adjust: 100%;
        }
        
        /* главный контейнер занимает ровно видимый экран */
        .app-container {
            display: flex;
            flex-direction: column;
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
        }
        
        /* скроллится ТОЛЬКО эта зона с сообщениями */
        .chat-area { 
            flex: 1; 
            overflow-y: scroll; 
            -webkit-overflow-scrolling: touch; /* плавная прокрутка на ios */
            padding: 20px; 
            box-sizing: border-box; 
            display: flex; 
            flex-direction: column; 
            gap: 15px; 
        }
        
        .message { display: flex; gap: 12px; align-items: flex-start; }
        .avatar { width: 40px; height: 40px; border-radius: 4px; object-fit: cover; background: #eee; flex-shrink: 0; }
        .msg-body { display: flex; flex-direction: column; gap: 2px; }
        .msg-header { font-size: 13px; font-weight: bold; color: #000000; }
        .msg-time { font-size: 11px; color: #666666; font-weight: normal; margin-left: 8px; }
        .msg-text { font-size: 14px; white-space: pre-wrap; word-break: break-word; line-height: 1.4; color: #000000; }
        
        /* панель ввода всегда намертво прижата к низу */
        .input-panel { 
            padding: 15px 20px; 
            background: #ffffff; 
            border-top: 1px solid #e0e0e0; 
            display: flex; 
            gap: 10px; 
            box-sizing: border-box; 
            width: 100%;
            flex-shrink: 0;
        }
        
        .input-field { flex: 1; height: 40px; border: 1px solid #000000; padding: 0 12px; font-family: sans-serif; font-size: 14px; box-sizing: border-box; outline: none; background: #ffffff; color: #000000; border-radius: 0; -webkit-appearance: none; }
        .send-btn { height: 40px; padding: 0 20px; background: #000000; color: #ffffff; border: 1px solid #000000; font-family: sans-serif; font-size: 14px; cursor: pointer; box-sizing: border-box; font-weight: bold; border-radius: 0; -webkit-appearance: none; }
        .send-btn:hover { background: #333333; border-color: #333333; }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="chat-area" id="chat-box"></div>

        <div class="input-panel">
            <input type="text" id="msg-input" class="input-field" placeholder="" autocomplete="off" maxlength="100">
            <button id="send-button" class="send-btn" onclick="sendMessage()">#</button>
        </div>
    </div>

    <script>
        const endpoint = window.location.origin;
        const chatBox = document.getElementById('chat-box');
        const msgInput = document.getElementById('msg-input');
        const avatarUrl = 'https://avatars.mds.yandex.net/i?id=eaf679ea7a219ab8023bcadc1157f73c_l-4248551-images-thumbs&n=33&w=1080&h=1080';
        
        let lastMessageId = -1;

        function appendMessage(msg) {
            const msgElement = document.createElement('div');
            msgElement.className = 'message';
            msgElement.innerHTML = `
                <img src="${avatarUrl}" class="avatar" alt="anon">
                <div class="msg-body">
                    <div class="msg-header">anonymous<span class="msg-time">${msg.timestamp}</span></div>
                    <div class="msg-text">${escapeHTML(msg.text)}</div>
                </div>
            `;
            chatBox.appendChild(msgElement);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function escapeHTML(str) {
            return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }

        async function sendMessage() {
            const text = msgInput.value.trim();
            if (!text || text.length > 100) return;

            msgInput.value = '';
            
            try {
                await fetch(`${endpoint}/send`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text })
                });
            } catch (e) {
                console.log('send error');
            }
        }

        async function listenForMessages() {
            while (true) {
                try {
                    const res = await fetch(`${endpoint}/messages?lastId=${lastMessageId}`);
                    if (res.status === 200) {
                        const msgs = await res.json();
                        msgs.forEach(msg => {
                            appendMessage(msg);
                            if (msg.id > lastMessageId) {
                                lastMessageId = msg.id;
                            }
                        });
                    }
                } catch (e) {
                    await new Promise(r => setTimeout(r, 2000));
                }
            }
        }

        msgInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });

        // Корректная подстройка под высоту мобильных клавиатур
        window.addEventListener('resize', () => {
            chatBox.scrollTop = chatBox.scrollHeight;
        });

        listenForMessages();
    </script>
</body>
</html>
