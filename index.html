<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>global chat</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            height: 100%;
            overflow: hidden;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
        }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: #fff;
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .top-bar {
            display: flex;
            justify-content: flex-end;
            padding: 6px 12px;
            background: #fff;
            border-bottom: 1px solid #ddd;
            flex-shrink: 0;
        }

        .username-btn {
            background: #000;
            color: white;
            border: none;
            padding: 4px 12px;
            font-size: 11px;
            font-weight: bold;
            cursor: pointer;
            clip-path: polygon(0% 0%, 100% 0%, 90% 100%, 0% 100%);
        }

        .chat-area {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            min-height: 0;
        }

        .message {
            display: flex;
            gap: 8px;
            align-items: flex-start;
        }

        .avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: #eee;
            flex-shrink: 0;
            cursor: pointer;
        }

        .msg-body {
            flex: 1;
        }

        .msg-header {
            font-size: 12px;
            font-weight: bold;
            margin-bottom: 2px;
        }

        .msg-name {
            color: #000;
        }

        .msg-time {
            font-size: 10px;
            color: #888;
            font-weight: normal;
            margin-left: 6px;
        }

        .msg-text {
            font-size: 13px;
            word-break: break-word;
            color: #222;
            line-height: 1.3;
        }
        
        .msg-image {
            max-width: 200px;
            max-height: 200px;
            border-radius: 8px;
            margin-top: 4px;
        }

        .input-panel {
            display: flex;
            gap: 8px;
            padding: 8px 12px;
            background: #fff;
            border-top: 1px solid #ddd;
            flex-shrink: 0;
        }

        .input-field {
            flex: 1;
            height: 40px;
            border: 1px solid #ccc;
            border-radius: 20px;
            padding: 0 14px;
            font-size: 14px;
            outline: none;
        }

        .input-field:focus {
            border-color: #000;
        }

        .send-btn, .photo-btn {
            height: 40px;
            padding: 0 18px;
            background: #000;
            color: #fff;
            border: none;
            border-radius: 20px;
            font-weight: bold;
            cursor: pointer;
        }

        .send-btn:disabled, .photo-btn:disabled {
            opacity: 0.5;
        }
        
        #photoInput {
            display: none;
        }

        .modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background: #fff;
            padding: 20px;
            border-radius: 16px;
            width: 260px;
            text-align: center;
        }

        .modal-content input, .modal-content textarea {
            width: 100%;
            margin: 12px 0;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 14px;
        }

        .modal-content textarea {
            height: 70px;
            resize: none;
        }

        .modal-content button {
            padding: 6px 14px;
            margin: 0 5px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        .save-btn {
            background: #000;
            color: #fff;
        }

        .cancel-btn {
            background: #ddd;
        }

        .toast {
            position: fixed;
            bottom: 70px;
            left: 50%;
            transform: translateX(-50%);
            background: #333;
            color: white;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 12px;
            z-index: 1100;
            white-space: nowrap;
        }
    </style>
</head>
<body>

<div class="top-bar">
    <button class="username-btn" id="usernameBtn">USERNAME</button>
</div>

<div class="chat-area" id="chatBox"></div>

<div class="input-panel">
    <button class="photo-btn" id="photoBtn">+</button>
    <input type="text" id="msgInput" class="input-field" placeholder="" maxlength="100" autocomplete="off">
    <button id="sendBtn" class="send-btn">#</button>
</div>

<input type="file" id="photoInput" accept="image/*">

<div id="reportModal" class="modal">
    <div class="modal-content">
        <h4>Report</h4>
        <textarea id="reportReason" placeholder="Reason..."></textarea>
        <div>
            <button id="reportSubmit" class="save-btn">OK</button>
            <button id="reportCancel" class="cancel-btn">X</button>
        </div>
    </div>
</div>

<div id="usernameModal" class="modal">
    <div class="modal-content">
        <h4>Set username</h4>
        <input type="text" id="usernameInput" placeholder="Username" maxlength="10" autocomplete="off">
        <div>
            <button id="usernameSave" class="save-btn">Save</button>
            <button id="usernameCancel" class="cancel-btn">Cancel</button>
        </div>
    </div>
</div>

<script>
    (function(){
        const endpoint = window.location.origin;
        const chatBox = document.getElementById('chatBox');
        const msgInput = document.getElementById('msgInput');
        const sendBtn = document.getElementById('sendBtn');
        const photoBtn = document.getElementById('photoBtn');
        const photoInput = document.getElementById('photoInput');
        const avatarUrl = 'https://avatars.mds.yandex.net/i?id=eaf679ea7a219ab8023bcadc1157f73c_l-4248551-images-thumbs&n=33&w=1080&h=1080';

        let lastId = -1;
        let isCooldown = false;
        let pendingReportId = null;
        let clickCount = 0;
        let clickTimer = null;
        let myUsername = '';

        function showToast(msg, isErr = false) {
            let t = document.querySelector('.toast');
            if(t) t.remove();
            let div = document.createElement('div');
            div.className = 'toast';
            div.textContent = msg;
            div.style.background = isErr ? '#e33' : '#333';
            document.body.appendChild(div);
            setTimeout(() => div.remove(), 2000);
        }

        function escapeHtml(str) {
            return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }

        function appendMessage(msg) {
            if(document.getElementById(`msg-${msg.id}`)) return;
            const div = document.createElement('div');
            div.id = `msg-${msg.id}`;
            div.className = 'message';
            const name = msg.username ? escapeHtml(msg.username) : 'anon';
            let content = '';
            if(msg.image_path && msg.image_path !== '') {
                const imgUrl = endpoint + msg.image_path;
                content = `<img src="${escapeHtml(imgUrl)}" class="msg-image" alt="image">`;
            } else {
                content = `<div class="msg-text">${escapeHtml(msg.text)}</div>`;
            }
            div.innerHTML = `
                <img src="${avatarUrl}" class="avatar" data-id="${msg.id}" alt="avatar">
                <div class="msg-body">
                    <div class="msg-header">
                        <span class="msg-name">${name}</span>
                        <span class="msg-time">${escapeHtml(msg.timestamp)}</span>
                    </div>
                    ${content}
                </div>
            `;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        async function loadUsername() {
            try {
                const res = await fetch(`${endpoint}/username`);
                const data = await res.json();
                myUsername = data.username || '';
            } catch(e) {}
        }

        async function saveUsernameToServer(username) {
            try {
                const res = await fetch(`${endpoint}/username`, {
                    method: 'POST',
                    headers: {'Content-Type':'application/json'},
                    body: JSON.stringify({ username })
                });
                if(res.status === 409) {
                    showToast('Username taken', true);
                    return false;
                }
                const data = await res.json();
                myUsername = data.username || '';
                return true;
            } catch(e) {
                return false;
            }
        }

        function setupReports() {
            document.addEventListener('click', (e) => {
                const avatar = e.target.closest('.avatar');
                if(!avatar) return;
                const mid = avatar.getAttribute('data-id');
                if(!mid) return;
                clickCount++;
                clearTimeout(clickTimer);
                if(clickCount >= 3) {
                    clickCount = 0;
                    pendingReportId = mid;
                    document.getElementById('reportModal').classList.add('show');
                    document.getElementById('reportReason').value = '';
                } else {
                    clickTimer = setTimeout(() => { clickCount = 0; }, 500);
                }
            });
        }

        async function sendReport() {
            if(!pendingReportId) return;
            const reason = document.getElementById('reportReason').value.trim();
            if(!reason) {
                showToast('Enter reason', true);
                return;
            }
            try {
                const res = await fetch(`${endpoint}/report`, {
                    method: 'POST',
                    headers: {'Content-Type':'application/json'},
                    body: JSON.stringify({ targetId: pendingReportId, reason })
                });
                const data = await res.json();
                if(data.cleared) {
                    showToast('Chat cleared');
                    lastId = -1;
                    chatBox.innerHTML = '';
                } else if(data.banned) {
                    showToast('User banned');
                } else if(data.unbanned) {
                    showToast('User unbanned');
                } else {
                    showToast('Report sent');
                }
                document.getElementById('reportModal').classList.remove('show');
                pendingReportId = null;
            } catch(e) {
                showToast('Error', true);
            }
        }

        async function sendMessageWithImage(imageFile) {
            const formData = new FormData();
            formData.append('text', '');
            formData.append('image', imageFile);
            
            try {
                const res = await fetch(`${endpoint}/send`, {
                    method: 'POST',
                    body: formData
                });
                if(res.status === 429) {
                    const txt = await res.text();
                    showToast(txt, true);
                    return false;
                }
                if(res.status === 403) {
                    const txt = await res.text();
                    showToast(txt, true);
                    setTimeout(() => location.reload(), 3000);
                    return false;
                }
                return true;
            } catch(e) {
                return false;
            }
        }

        async function sendMessage(text) {
            const formData = new FormData();
            formData.append('text', text);
            
            try {
                const res = await fetch(`${endpoint}/send`, {
                    method: 'POST',
                    body: formData
                });
                if(res.status === 429) {
                    const txt = await res.text();
                    showToast(txt, true);
                    return false;
                }
                if(res.status === 403) {
                    const txt = await res.text();
                    showToast(txt, true);
                    setTimeout(() => location.reload(), 3000);
                    return false;
                }
                return true;
            } catch(e) {
                return false;
            }
        }

        async function handleSendMessage() {
            const text = msgInput.value.trim();
            if((!text || text.length > 100) && isCooldown) return;
            if(isCooldown) return;
            
            msgInput.value = '';
            startCooldown();
            const success = await sendMessage(text);
        }
        
        function startCooldown() {
            isCooldown = true;
            sendBtn.disabled = true;
            photoBtn.disabled = true;
            msgInput.disabled = true;
            let sec = 2;
            msgInput.placeholder = `${sec}s...`;
            const timer = setInterval(() => {
                sec--;
                if(sec > 0) {
                    msgInput.placeholder = `${sec}s...`;
                } else {
                    clearInterval(timer);
                    isCooldown = false;
                    sendBtn.disabled = false;
                    photoBtn.disabled = false;
                    msgInput.disabled = false;
                    msgInput.placeholder = '';
                    msgInput.focus();
                }
            }, 1000);
        }

        function handlePhotoUpload() {
            const file = photoInput.files[0];
            if(!file) return;
            if(!file.type.startsWith('image/')) {
                showToast('Only images', true);
                return;
            }
            if(file.size > 5 * 1024 * 1024) {
                showToast('Max 5MB', true);
                return;
            }
            
            if(isCooldown) return;
            startCooldown();
            sendMessageWithImage(file);
            photoInput.value = '';
        }

        async function pollMessages() {
            while(true) {
                try {
                    const res = await fetch(`${endpoint}/messages?lastId=${lastId}`);
                    if(res.status === 200) {
                        const list = await res.json();
                        if(list.clear) {
                            lastId = -1;
                            chatBox.innerHTML = '';
                        } else {
                            for(let m of list) {
                                appendMessage(m);
                                if(m.id > lastId) lastId = m.id;
                            }
                        }
                    }
                } catch(e) {
                    await new Promise(r => setTimeout(r, 2000));
                }
            }
        }

        function openUsernameModal() {
            const modal = document.getElementById('usernameModal');
            const input = document.getElementById('usernameInput');
            input.value = myUsername;
            modal.classList.add('show');
        }

        async function saveUsernameModal() {
            const newName = document.getElementById('usernameInput').value.trim();
            if(newName.length > 10) {
                showToast('Max 10 chars', true);
                return;
            }
            const ok = await saveUsernameToServer(newName);
            if(ok) {
                showToast(myUsername ? `Username: ${myUsername}` : 'Username cleared');
                document.getElementById('usernameModal').classList.remove('show');
            }
        }

        sendBtn.addEventListener('click', handleSendMessage);
        photoBtn.addEventListener('click', () => photoInput.click());
        photoInput.addEventListener('change', handlePhotoUpload);
        msgInput.addEventListener('keydown', (e) => {
            if(e.key === 'Enter' && !isCooldown) handleSendMessage();
        });
        document.getElementById('usernameBtn').addEventListener('click', openUsernameModal);
        document.getElementById('usernameSave').addEventListener('click', saveUsernameModal);
        document.getElementById('usernameCancel').addEventListener('click', () => {
            document.getElementById('usernameModal').classList.remove('show');
        });
        document.getElementById('reportSubmit').addEventListener('click', sendReport);
        document.getElementById('reportCancel').addEventListener('click', () => {
            document.getElementById('reportModal').classList.remove('show');
            pendingReportId = null;
        });

        setupReports();
        loadUsername().then(() => {
            pollMessages();
        });
    })();
</script>
</body>
</html>
