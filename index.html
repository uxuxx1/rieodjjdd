<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>global chat</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        html, body { 
            height: 100%; 
            overflow: hidden;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
        }
        
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #ffffff;
            display: flex;
            flex-direction: column;
            height: 100%;
        }
        
        .chat-area { 
            flex: 1; 
            overflow-y: auto; 
            padding: 10px; 
            display: flex; 
            flex-direction: column; 
            gap: 10px;
            -webkit-overflow-scrolling: touch;
            min-height: 0;
        }
        
        .message { 
            display: flex; 
            gap: 8px; 
            align-items: flex-start;
        }
        
        .avatar { 
            width: 32px; 
            height: 32px; 
            border-radius: 50%; 
            background: #f0f0f0;
            cursor: pointer;
            flex-shrink: 0;
        }
        
        .msg-body { flex: 1; min-width: 0; }
        .msg-header { font-size: 12px; font-weight: bold; margin-bottom: 2px; }
        .msg-time { font-size: 10px; color: #888; font-weight: normal; margin-left: 6px; }
        .msg-text { font-size: 13px; word-break: break-word; line-height: 1.3; color: #333; }
        
        .input-panel { 
            padding: 10px 12px; 
            border-top: 1px solid #e0e0e0; 
            display: flex; 
            gap: 8px; 
            background: white;
            flex-shrink: 0;
        }
        
        .input-field { 
            flex: 1; 
            height: 36px; 
            border: 1px solid #ddd; 
            padding: 0 12px; 
            font-size: 14px; 
            border-radius: 18px;
            outline: none;
        }
        
        .input-field:focus { border-color: #000; }
        
        .send-btn { 
            height: 36px; 
            padding: 0 16px; 
            background: #000; 
            color: white; 
            border: none; 
            border-radius: 18px;
            font-weight: bold;
            cursor: pointer;
            font-size: 14px;
        }
        
        .send-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        
        .toast {
            position: fixed;
            bottom: 70px;
            left: 50%;
            transform: translateX(-50%);
            background: #333;
            color: white;
            padding: 6px 12px;
            border-radius: 16px;
            font-size: 12px;
            z-index: 1000;
            white-space: nowrap;
        }
        
        .report-modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }
        
        .report-modal.show { display: flex; }
        
        .report-content {
            background: white;
            padding: 16px;
            border-radius: 12px;
            width: 260px;
            text-align: center;
        }
        
        .report-content h4 { font-size: 16px; margin-bottom: 10px; }
        .report-content textarea {
            width: 100%;
            height: 70px;
            margin: 10px 0;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 8px;
            resize: none;
            font-family: inherit;
            font-size: 13px;
        }
        
        .report-content button {
            padding: 6px 14px;
            margin: 0 4px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
        }
        
        .report-submit { background: #ff4444; color: white; }
        .report-cancel { background: #ddd; }
    </style>
</head>
<body>
    <div class="chat-area" id="chat-box"></div>
    <div class="input-panel">
        <input type="text" id="msg-input" class="input-field" placeholder="" maxlength="100" autocomplete="off">
        <button id="send-button" class="send-btn">#</button>
    </div>
    
    <div id="report-modal" class="report-modal">
        <div class="report-content">
            <h4>Report</h4>
            <textarea id="report-reason" placeholder="Reason..."></textarea>
            <div>
                <button class="report-submit" id="report-submit">OK</button>
                <button class="report-cancel" id="report-cancel">X</button>
            </div>
        </div>
    </div>

    <script>
        const endpoint = window.location.origin;
        const chatBox = document.getElementById('chat-box');
        const msgInput = document.getElementById('msg-input');
        const sendButton = document.getElementById('send-button');
        const avatarUrl = 'https://avatars.mds.yandex.net/i?id=eaf679ea7a219ab8023bcadc1157f73c_l-4248551-images-thumbs&n=33&w=1080&h=1080';
        
        let lastMessageId = -1;
        let isCooldown = false;
        let pendingReportId = null;
        let clickCount = 0;
        let clickTimer = null;
        
        function showToast(msg, isError = false) {
            let toast = document.querySelector('.toast');
            if (toast) toast.remove();
            toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = msg;
            toast.style.background = isError ? '#ff4444' : '#333';
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2000);
        }
        
        function appendMessage(msg) {
            if (document.getElementById(`msg-${msg.id}`)) return;
            
            const msgElement = document.createElement('div');
            msgElement.id = `msg-${msg.id}`;
            msgElement.className = 'message';
            msgElement.innerHTML = `
                <img src="${avatarUrl}" class="avatar" data-id="${msg.id}" alt="anon">
                <div class="msg-body">
                    <div class="msg-header">anon<span class="msg-time">${escapeHTML(msg.timestamp)}</span></div>
                    <div class="msg-text">${escapeHTML(msg.text)}</div>
                </div>
            `;
            chatBox.appendChild(msgElement);
            setTimeout(() => { chatBox.scrollTop = chatBox.scrollHeight; }, 50);
        }
        
        function escapeHTML(str) {
            return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }
        
        function setupReportSystem() {
            document.addEventListener('click', (e) => {
                const avatar = e.target.closest('.avatar');
                if (!avatar) return;
                const msgId = avatar.getAttribute('data-id');
                if (!msgId) return;
                
                clickCount++;
                clearTimeout(clickTimer);
                
                if (clickCount >= 3) {
                    clickCount = 0;
                    openReportModal(msgId);
                } else {
                    clickTimer = setTimeout(() => { clickCount = 0; }, 500);
                }
            });
        }
        
        function openReportModal(msgId) {
            pendingReportId = msgId;
            document.getElementById('report-modal').classList.add('show');
            document.getElementById('report-reason').value = '';
        }
        
        async function submitReport() {
            if (!pendingReportId) return;
            const reason = document.getElementById('report-reason').value.trim();
            if (!reason) {
                showToast('Enter reason', true);
                return;
            }
            
            try {
                const res = await fetch(`${endpoint}/report`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ targetId: pendingReportId, reason })
                });
                const data = await res.json();
                
                if (data.cleared) {
                    showToast('Chat cleared');
                    lastMessageId = -1;
                    chatBox.innerHTML = '';
                } else if (data.banned) {
                    showToast('User banned');
                } else if (data.unbanned) {
                    showToast('User unbanned');
                } else {
                    showToast('Report sent');
                }
                closeReportModal();
            } catch(e) {
                showToast('Error', true);
            }
        }
        
        function closeReportModal() {
            document.getElementById('report-modal').classList.remove('show');
            pendingReportId = null;
        }
        
        async function sendMessage() {
            const text = msgInput.value.trim();
            if (!text || text.length > 100 || isCooldown) return;
            
            msgInput.value = '';
            startCooldown();
            
            try {
                const res = await fetch(`${endpoint}/send`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text })
                });
                if (res.status === 429) showToast(await res.text(), true);
                if (res.status === 403) showToast('Banned', true);
            } catch(e) {}
        }
        
        function startCooldown() {
            isCooldown = true;
            sendButton.disabled = true;
            msgInput.disabled = true;
            
            let secondsLeft = 2;
            msgInput.placeholder = `${secondsLeft}s...`;
            
            const interval = setInterval(() => {
                secondsLeft--;
                if (secondsLeft > 0) {
                    msgInput.placeholder = `${secondsLeft}s...`;
                } else {
                    clearInterval(interval);
                    isCooldown = false;
                    sendButton.disabled = false;
                    msgInput.disabled = false;
                    msgInput.placeholder = '';
                    msgInput.focus();
                }
            }, 1000);
        }
        
        async function listenForMessages() {
            while (true) {
                try {
                    const res = await fetch(`${endpoint}/messages?lastId=${lastMessageId}`);
                    if (res.status === 200) {
                        const msgs = await res.json();
                        if (msgs.clear) {
                            lastMessageId = -1;
                            chatBox.innerHTML = '';
                        } else {
                            msgs.forEach(msg => {
                                appendMessage(msg);
                                if (msg.id > lastMessageId) lastMessageId = msg.id;
                            });
                        }
                    }
                } catch(e) {
                    await new Promise(r => setTimeout(r, 2000));
                }
            }
        }
        
        msgInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !isCooldown) sendMessage();
        });
        sendButton.addEventListener('click', sendMessage);
        document.getElementById('report-submit').addEventListener('click', submitReport);
        document.getElementById('report-cancel').addEventListener('click', closeReportModal);
        
        setupReportSystem();
        listenForMessages();
    </script>
</body>
</html>
