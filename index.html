<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>global chat</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            height: 100%;
            overflow: hidden;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
        }

        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #1a1a1a;
            color: #fff;
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        body.light {
            background: #fff;
            color: #000;
        }

        body.light .top-bar,
        body.light .input-panel {
            background: #fff;
            border-color: #ddd;
        }

        body.light .input-field {
            background: #fff;
            border-color: #ccc;
            color: #000;
        }

        body.light .msg-text {
            color: #222;
        }

        body.light .msg-time {
            color: #888;
        }

        body.light .modal-content {
            background: #fff;
            color: #000;
        }

        body.light .modal-content input,
        body.light .modal-content textarea {
            background: #fff;
            border-color: #ccc;
            color: #000;
        }

        body.light .reply-indicator span {
            background: #f0f0f0;
        }

        body.light .avatar {
            background: #eee;
        }

        body.light .msg-name {
            color: #000;
        }

        body.light .reply-btn:hover {
            background: #f0f0f0;
        }

        body.light .message {
            border-bottom: 1px solid #e0e0e0;
        }

        body.light .warning-banner {
            background: #000;
            color: #fff;
        }

        body.light .online-count {
            color: #000;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 12px;
            background: #1a1a1a;
            border-bottom: 1px solid #333;
            flex-shrink: 0;
        }

        .top-bar-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .top-bar-right {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .theme-btn, .auth-btn {
            background: #000;
            color: white;
            border: none;
            padding: 4px 12px;
            font-size: 11px;
            font-weight: bold;
            cursor: pointer;
            clip-path: polygon(0% 0%, 100% 0%, 90% 100%, 0% 100%);
        }

        .logout-btn {
            background: #333;
        }

        .online-count {
            font-size: 11px;
            font-weight: normal;
            color: #fff;
            background: transparent;
            padding: 4px 8px;
        }

        .chat-area {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 0;
            min-height: 0;
        }

        .message {
            display: flex;
            gap: 8px;
            align-items: flex-start;
            position: relative;
            padding-bottom: 10px;
            margin-bottom: 10px;
            border-bottom: 1px solid #2a2a2a;
        }

        body.light .message {
            border-bottom: 1px solid #e0e0e0;
        }

        .reply-indicator {
            font-size: 11px;
            color: #aaa;
            margin-bottom: 2px;
            padding-left: 40px;
        }

        body.light .reply-indicator {
            color: #888;
        }

        .reply-indicator span {
            background: #333;
            padding: 2px 6px;
            border-radius: 12px;
            display: inline-block;
        }

        body.light .reply-indicator span {
            background: #f0f0f0;
        }

        .avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: #333;
            flex-shrink: 0;
            cursor: pointer;
        }

        body.light .avatar {
            background: #eee;
        }

        .msg-body {
            flex: 1;
        }

        .msg-header {
            font-size: 12px;
            font-weight: bold;
            margin-bottom: 2px;
        }

        .msg-name {
            cursor: pointer;
        }
        
        .role-badge {
            font-size: 9px;
            padding: 2px 6px;
            border-radius: 12px;
            margin-left: 6px;
            font-weight: normal;
        }
        
        .role-admin { background: #ff4444; color: white; }
        .role-moder { background: #ff8800; color: white; }
        .role-vip { background: #ffd700; color: #000; }
        .role-user { background: #444; color: #ccc; }

        body.light .role-user { background: #ddd; color: #666; }

        .msg-time {
            font-size: 10px;
            color: #666;
            font-weight: normal;
            margin-left: 6px;
        }

        body.light .msg-time {
            color: #888;
        }

        .msg-text {
            font-size: 13px;
            word-break: break-word;
            color: #ddd;
            line-height: 1.3;
        }

        body.light .msg-text {
            color: #222;
        }
        
        .msg-image {
            max-width: 200px;
            max-height: 200px;
            border-radius: 8px;
            margin-top: 4px;
        }

        .reply-btn {
            font-size: 10px;
            color: #aaa;
            background: none;
            border: none;
            cursor: pointer;
            margin-left: 8px;
            padding: 2px 6px;
            border-radius: 12px;
        }

        .reply-btn:hover {
            background: #333;
        }

        body.light .reply-btn:hover {
            background: #f0f0f0;
        }

        .input-panel {
            display: flex;
            gap: 8px;
            padding: 8px 12px;
            background: #1a1a1a;
            border-top: 1px solid #333;
            flex-shrink: 0;
        }

        body.light .input-panel {
            background: #fff;
            border-top: 1px solid #ddd;
        }

        .input-field {
            flex: 1;
            height: 40px;
            border: 1px solid #444;
            border-radius: 20px;
            padding: 0 14px;
            font-size: 14px;
            outline: none;
            background: #2a2a2a;
            color: #fff;
        }

        body.light .input-field {
            background: #fff;
            border-color: #ccc;
            color: #000;
        }

        .input-field:focus {
            border-color: #666;
        }

        body.light .input-field:focus {
            border-color: #000;
        }

        .input-field:disabled {
            background: #2a2a2a;
            opacity: 0.7;
        }

        body.light .input-field:disabled {
            background: #f5f5f5;
        }

        .send-btn, .photo-btn {
            height: 40px;
            padding: 0 18px;
            background: #000;
            color: #fff;
            border: none;
            border-radius: 20px;
            font-weight: bold;
            cursor: pointer;
        }

        .send-btn:disabled, .photo-btn:disabled {
            opacity: 0.5;
        }
        
        #photoInput {
            display: none;
        }

        .modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background: #2a2a2a;
            padding: 20px;
            border-radius: 16px;
            width: 280px;
            text-align: center;
        }

        body.light .modal-content {
            background: #fff;
        }

        .modal-content input {
            width: 100%;
            margin: 10px 0;
            padding: 10px;
            border: 1px solid #444;
            border-radius: 8px;
            font-size: 14px;
            background: #1a1a1a;
            color: #fff;
        }

        body.light .modal-content input {
            background: #fff;
            border-color: #ccc;
            color: #000;
        }

        .modal-content textarea {
            width: 100%;
            margin: 10px 0;
            padding: 10px;
            border: 1px solid #444;
            border-radius: 8px;
            font-size: 14px;
            background: #1a1a1a;
            color: #fff;
            resize: none;
            height: 70px;
        }

        body.light .modal-content textarea {
            background: #fff;
            border-color: #ccc;
            color: #000;
        }

        .modal-content button {
            padding: 8px 16px;
            margin: 5px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        .save-btn {
            background: #000;
            color: #fff;
        }

        .cancel-btn {
            background: #444;
            color: #fff;
        }

        body.light .cancel-btn {
            background: #ddd;
            color: #000;
        }

        .toast {
            position: fixed;
            bottom: 70px;
            left: 50%;
            transform: translateX(-50%);
            background: #333;
            color: white;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 12px;
            z-index: 1100;
            white-space: nowrap;
        }

        body.light .toast {
            background: #555;
        }

        .warning-banner {
            background: #fff;
            color: #000;
            text-align: center;
            padding: 6px;
            font-size: 12px;
            flex-shrink: 0;
        }

        body.light .warning-banner {
            background: #000;
            color: #fff;
        }
    </style>
</head>
<body>

<div class="top-bar">
    <div class="top-bar-left">
        <button class="theme-btn" id="themeBtn">theme</button>
        <div class="online-count" id="onlineCount">online: --</div>
    </div>
    <div class="top-bar-right" id="authButtons">
        <button class="auth-btn" id="loginBtn">login</button>
        <button class="auth-btn" id="registerBtn">register</button>
    </div>
</div>

<div id="warningBanner" class="warning-banner" style="display: none;">register to write</div>

<div class="chat-area" id="chatBox"></div>

<div class="input-panel">
    <button class="photo-btn" id="photoBtn" disabled>+</button>
    <input type="text" id="msgInput" class="input-field" placeholder="register to write" maxlength="100" autocomplete="off" disabled>
    <button id="sendBtn" class="send-btn" disabled>#</button>
</div>

<input type="file" id="photoInput" accept="image/*">

<div id="loginModal" class="modal">
    <div class="modal-content">
        <h4>Login</h4>
        <input type="text" id="loginUsername" placeholder="Username" maxlength="12">
        <input type="password" id="loginPassword" placeholder="Password" maxlength="20">
        <div>
            <button id="loginSubmit" class="save-btn">Login</button>
            <button id="loginCancel" class="cancel-btn">Cancel</button>
        </div>
    </div>
</div>

<div id="registerModal" class="modal">
    <div class="modal-content">
        <h4>Register</h4>
        <input type="text" id="registerUsername" placeholder="Username (3-12 chars)" maxlength="12">
        <input type="password" id="registerPassword" placeholder="Password (3-20 chars)" maxlength="20">
        <div>
            <button id="registerSubmit" class="save-btn">Register</button>
            <button id="registerCancel" class="cancel-btn">Cancel</button>
        </div>
    </div>
</div>

<div id="reportModal" class="modal">
    <div class="modal-content">
        <h4>Report user</h4>
        <textarea id="reportReason" placeholder="Reason..."></textarea>
        <div>
            <button id="reportSubmit" class="save-btn">Send</button>
            <button id="reportCancel" class="cancel-btn">Cancel</button>
        </div>
    </div>
</div>

<script>
    (function(){
        const endpoint = window.location.origin;
        const chatBox = document.getElementById('chatBox');
        const msgInput = document.getElementById('msgInput');
        const sendBtn = document.getElementById('sendBtn');
        const photoBtn = document.getElementById('photoBtn');
        const photoInput = document.getElementById('photoInput');
        const authButtons = document.getElementById('authButtons');
        const warningBanner = document.getElementById('warningBanner');
        const onlineCountSpan = document.getElementById('onlineCount');
        const avatarUrl = 'https://avatars.mds.yandex.net/i?id=eaf679ea7a219ab8023bcadc1157f73c_l-4248551-images-thumbs&n=33&w=1080&h=1080';

        let lastId = -1;
        let isCooldown = false;
        let pendingReportId = null;
        let clickCount = 0;
        let clickTimer = null;
        let myToken = localStorage.getItem('chatToken');
        let myUsername = '';
        let myRole = '';
        let replyToMsg = null;
        let ws = null;
        let wsReconnectTimer = null;

        let isDark = localStorage.getItem('theme') !== 'light';
        function applyTheme() {
            if (isDark) {
                document.body.classList.remove('light');
            } else {
                document.body.classList.add('light');
            }
        }
        applyTheme();

        function showToast(msg, isErr = false) {
            let t = document.querySelector('.toast');
            if(t) t.remove();
            let div = document.createElement('div');
            div.className = 'toast';
            div.textContent = msg;
            div.style.background = isErr ? '#e33' : '#333';
            document.body.appendChild(div);
            setTimeout(() => div.remove(), 2000);
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }

        function getRoleBadge(role) {
            const roleMap = {
                'admin': '<span class="role-badge role-admin">admin</span>',
                'moder': '<span class="role-badge role-moder">moder</span>',
                'vip': '<span class="role-badge role-vip">vip</span>',
                'user': '<span class="role-badge role-user">user</span>'
            };
            return roleMap[role] || '';
        }

        function updateOnlineCount(count) {
            onlineCountSpan.textContent = 'online: ' + count;
        }

        function connectWebSocket() {
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            const wsUrl = protocol + '//' + window.location.host + '/ws';
            
            ws = new WebSocket(wsUrl);
            
            ws.onopen = function() {
                console.log('WebSocket connected');
                if (wsReconnectTimer) clearTimeout(wsReconnectTimer);
            };
            
            ws.onmessage = function(event) {
                try {
                    const data = JSON.parse(event.data);
                    if (data.type === 'online') {
                        updateOnlineCount(data.data);
                    } else if (data.type === 'message') {
                        appendMessage(data.data);
                        if (data.data.id > lastId) lastId = data.data.id;
                    } else if (data.type === 'clear') {
                        lastId = -1;
                        chatBox.innerHTML = '';
                        loadHistory();
                    }
                } catch(e) {}
            };
            
            ws.onclose = function() {
                console.log('WebSocket disconnected, reconnecting...');
                if (wsReconnectTimer) clearTimeout(wsReconnectTimer);
                wsReconnectTimer = setTimeout(connectWebSocket, 3000);
            };
            
            ws.onerror = function() {
                ws.close();
            };
        }

        function updateAuthUI() {
            if (myToken && myUsername) {
                authButtons.innerHTML = '<span style="color:#fff; font-size:11px; margin-right:8px;">' + escapeHtml(myUsername) + getRoleBadge(myRole) + '</span><button class="auth-btn logout-btn" id="logoutBtn">logout</button>';
                const logoutBtn = document.getElementById('logoutBtn');
                if (logoutBtn) logoutBtn.addEventListener('click', logout);
                msgInput.disabled = false;
                photoBtn.disabled = false;
                sendBtn.disabled = false;
                msgInput.placeholder = '';
                warningBanner.style.display = 'none';
                
                if (document.body.classList.contains('light')) {
                    const span = document.querySelector('#authButtons span');
                    if (span) span.style.color = '#000';
                }
            } else {
                authButtons.innerHTML = '<button class="auth-btn" id="loginBtn">login</button><button class="auth-btn" id="registerBtn">register</button>';
                const loginBtn = document.getElementById('loginBtn');
                const registerBtn = document.getElementById('registerBtn');
                if (loginBtn) loginBtn.addEventListener('click', () => openModal('login'));
                if (registerBtn) registerBtn.addEventListener('click', () => openModal('register'));
                msgInput.disabled = true;
                photoBtn.disabled = true;
                sendBtn.disabled = true;
                msgInput.placeholder = 'register to write';
                warningBanner.style.display = 'block';
                myToken = null;
                myUsername = '';
                myRole = '';
                localStorage.removeItem('chatToken');
            }
        }

        async function verifyToken() {
            if (!myToken) return false;
            try {
                const res = await fetch(endpoint + '/verify', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token: myToken })
                });
                const data = await res.json();
                if (data.valid) {
                    myUsername = data.username;
                    myRole = data.role || 'user';
                    return true;
                } else {
                    myToken = null;
                    localStorage.removeItem('chatToken');
                    return false;
                }
            } catch(e) {
                return false;
            }
        }

        async function logout() {
            if (myToken) {
                await fetch(endpoint + '/logout', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token: myToken })
                });
            }
            myToken = null;
            myUsername = '';
            myRole = '';
            localStorage.removeItem('chatToken');
            updateAuthUI();
            showToast('Logged out');
        }

        async function register(username, password) {
            try {
                const res = await fetch(endpoint + '/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                if (res.status === 409) {
                    showToast('Username already exists', true);
                    return false;
                }
                if (!res.ok) {
                    const err = await res.text();
                    showToast(err, true);
                    return false;
                }
                const data = await res.json();
                myToken = data.token;
                myUsername = data.username;
                myRole = data.role || 'user';
                localStorage.setItem('chatToken', myToken);
                updateAuthUI();
                showToast('Welcome ' + myUsername + '!');
                return true;
            } catch(e) {
                showToast('Registration failed', true);
                return false;
            }
        }

        async function login(username, password) {
            try {
                const res = await fetch(endpoint + '/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                if (!res.ok) {
                    showToast('Invalid credentials', true);
                    return false;
                }
                const data = await res.json();
                myToken = data.token;
                myUsername = data.username;
                myRole = data.role || 'user';
                localStorage.setItem('chatToken', myToken);
                updateAuthUI();
                showToast('Welcome back ' + myUsername + '!');
                return true;
            } catch(e) {
                showToast('Login failed', true);
                return false;
            }
        }

        function openModal(type) {
            if (type === 'login') {
                document.getElementById('loginModal').classList.add('show');
                document.getElementById('loginUsername').value = '';
                document.getElementById('loginPassword').value = '';
            } else {
                document.getElementById('registerModal').classList.add('show');
                document.getElementById('registerUsername').value = '';
                document.getElementById('registerPassword').value = '';
            }
        }

        function appendMessage(msg) {
            if(document.getElementById('msg-' + msg.id)) return;
            
            let replyHtml = '';
            if (msg.reply_to && msg.reply_to > 0) {
                const replyPreview = msg.reply_text ? (msg.reply_text.length > 50 ? msg.reply_text.substring(0, 50) + '...' : msg.reply_text) : '';
                const replyName = msg.reply_username ? escapeHtml(msg.reply_username) : 'anon';
                replyHtml = '<div class="reply-indicator"><span>reply to ' + replyName + ': ' + escapeHtml(replyPreview) + '</span></div>';
            }
            
            const div = document.createElement('div');
            div.id = 'msg-' + msg.id;
            div.className = 'message';
            const name = msg.username ? escapeHtml(msg.username) : 'anon';
            const roleBadge = getRoleBadge(msg.role || 'user');
            let content = '';
            if(msg.image_path && msg.image_path !== '') {
                const imgUrl = endpoint + msg.image_path;
                content = '<img src="' + escapeHtml(imgUrl) + '" class="msg-image" alt="image">';
            } else {
                content = '<div class="msg-text">' + escapeHtml(msg.text) + '</div>';
            }
            div.innerHTML = '<img src="' + avatarUrl + '" class="avatar" data-id="' + msg.id + '" alt="avatar">' +
                '<div class="msg-body">' +
                    replyHtml +
                    '<div class="msg-header">' +
                        '<span class="msg-name" data-id="' + msg.id + '">' + name + '</span>' +
                        roleBadge +
                        '<span class="msg-time">' + escapeHtml(msg.timestamp) + '</span>' +
                        '<button class="reply-btn" data-id="' + msg.id + '" data-name="' + name + '">reply</button>' +
                    '</div>' +
                    content +
                '</div>';
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        async function sendReport() {
            if (!pendingReportId) return;
            const reason = document.getElementById('reportReason').value.trim();
            if (!reason) {
                showToast('Enter reason', true);
                return;
            }
            if (!myToken) {
                showToast('Login to report', true);
                return;
            }
            try {
                const res = await fetch(endpoint + '/report', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token: myToken, targetId: pendingReportId, reason: reason })
                });
                const data = await res.json();
                if (data.cleared) {
                    showToast('Chat cleared');
                    lastId = -1;
                    chatBox.innerHTML = '';
                    loadHistory();
                } else if (data.banned) {
                    showToast('User banned');
                } else if (data.roleChanged && data.newRole) {
                    myRole = data.newRole;
                    showToast('Your role changed to: ' + data.newRole);
                    updateAuthUI();
                } else {
                    showToast('Report sent');
                }
                document.getElementById('reportModal').classList.remove('show');
                pendingReportId = null;
            } catch(e) {
                showToast('Error', true);
            }
        }

        function setupReportsAndReplies() {
            document.addEventListener('click', (e) => {
                const avatar = e.target.closest('.avatar');
                if (avatar) {
                    const msgId = avatar.getAttribute('data-id');
                    if (msgId) {
                        clickCount++;
                        clearTimeout(clickTimer);
                        if (clickCount >= 3) {
                            clickCount = 0;
                            pendingReportId = msgId;
                            document.getElementById('reportModal').classList.add('show');
                            document.getElementById('reportReason').value = '';
                        } else {
                            clickTimer = setTimeout(() => { clickCount = 0; }, 500);
                        }
                    }
                }
                
                const replyBtn = e.target.closest('.reply-btn');
                if (replyBtn) {
                    const msgId = replyBtn.getAttribute('data-id');
                    const msgName = replyBtn.getAttribute('data-name');
                    if (msgId) {
                        replyToMsg = { id: msgId, name: msgName };
                        msgInput.focus();
                        msgInput.placeholder = 'Replying to ' + msgName + '...';
                        setTimeout(() => {
                            if (msgInput.placeholder === 'Replying to ' + msgName + '...') {
                                msgInput.placeholder = '';
                            }
                        }, 3000);
                        showToast('Replying to ' + msgName);
                    }
                }
            });
        }

        async function sendMessage(text, isImage = false, imageData = null) {
            if (!myToken) {
                showToast('Login to send messages', true);
                return false;
            }
            
            let body;
            if (isImage && imageData) {
                body = JSON.stringify({ 
                    token: myToken, 
                    text: '', 
                    isImage: true, 
                    imageUrl: imageData,
                    replyTo: replyToMsg ? replyToMsg.id : null
                });
            } else {
                body = JSON.stringify({ 
                    token: myToken, 
                    text: text,
                    replyTo: replyToMsg ? replyToMsg.id : null
                });
            }
            
            try {
                const res = await fetch(endpoint + '/send', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: body
                });
                if (res.status === 401) {
                    showToast('Session expired, login again', true);
                    logout();
                    return false;
                }
                if (res.status === 429) {
                    const txt = await res.text();
                    showToast(txt, true);
                    return false;
                }
                if (res.status === 403) {
                    const txt = await res.text();
                    showToast(txt, true);
                    return false;
                }
                if (res.ok) {
                    replyToMsg = null;
                    return true;
                }
                return false;
            } catch(e) {
                return false;
            }
        }

        async function handleSendMessage() {
            const text = msgInput.value.trim();
            if (!text || text.length > 100 || isCooldown) return;
            if (!myToken) {
                showToast('Login to send messages', true);
                return;
            }
            msgInput.value = '';
            startCooldown();
            await sendMessage(text);
        }
        
        function startCooldown() {
            isCooldown = true;
            sendBtn.disabled = true;
            photoBtn.disabled = true;
            msgInput.disabled = true;
            let sec = 2;
            msgInput.placeholder = sec + 's...';
            const timer = setInterval(() => {
                sec--;
                if (sec > 0) {
                    msgInput.placeholder = sec + 's...';
                } else {
                    clearInterval(timer);
                    isCooldown = false;
                    sendBtn.disabled = false;
                    photoBtn.disabled = false;
                    msgInput.disabled = false;
                    msgInput.placeholder = '';
                    msgInput.focus();
                }
            }, 1000);
        }

        function handlePhotoUpload() {
            const file = photoInput.files[0];
            if (!file) return;
            if (!file.type.startsWith('image/')) {
                showToast('Only images', true);
                return;
            }
            if (file.size > 5 * 1024 * 1024) {
                showToast('Max 5MB', true);
                return;
            }
            if (!myToken) {
                showToast('Login to send images', true);
                return;
            }
            
            const reader = new FileReader();
            reader.onload = async function(e) {
                if (isCooldown) return;
                startCooldown();
                await sendMessage('', true, e.target.result);
                photoInput.value = '';
            };
            reader.readAsDataURL(file);
        }

        async function loadHistory() {
            try {
                const res = await fetch(endpoint + '/history');
                if (res.status === 200) {
                    const list = await res.json();
                    chatBox.innerHTML = '';
                    lastId = -1;
                    for (let m of list) {
                        appendMessage(m);
                        if (m.id > lastId) lastId = m.id;
                    }
                }
            } catch(e) {}
        }

        function closeModals() {
            document.getElementById('loginModal').classList.remove('show');
            document.getElementById('registerModal').classList.remove('show');
            document.getElementById('reportModal').classList.remove('show');
        }

        sendBtn.addEventListener('click', handleSendMessage);
        photoBtn.addEventListener('click', () => photoInput.click());
        photoInput.addEventListener('change', handlePhotoUpload);
        msgInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !isCooldown && myToken) handleSendMessage();
        });
        
        document.getElementById('themeBtn').addEventListener('click', () => {
            isDark = !isDark;
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            applyTheme();
            updateAuthUI();
        });
        
        document.getElementById('loginSubmit').addEventListener('click', async () => {
            const username = document.getElementById('loginUsername').value.trim();
            const password = document.getElementById('loginPassword').value.trim();
            if (!username || !password) {
                showToast('Fill all fields', true);
                return;
            }
            await login(username, password);
            closeModals();
            loadHistory();
        });
        
        document.getElementById('loginCancel').addEventListener('click', closeModals);
        
        document.getElementById('registerSubmit').addEventListener('click', async () => {
            const username = document.getElementById('registerUsername').value.trim();
            const password = document.getElementById('registerPassword').value.trim();
            if (username.length < 3 || username.length > 12) {
                showToast('Username 3-12 chars', true);
                return;
            }
            if (password.length < 3 || password.length > 20) {
                showToast('Password 3-20 chars', true);
                return;
            }
            await register(username, password);
            closeModals();
            loadHistory();
        });
        
        document.getElementById('registerCancel').addEventListener('click', closeModals);
        document.getElementById('reportSubmit').addEventListener('click', sendReport);
        document.getElementById('reportCancel').addEventListener('click', () => {
            document.getElementById('reportModal').classList.remove('show');
            pendingReportId = null;
        });
        
        setupReportsAndReplies();
        
        (async function init() {
            await verifyToken();
            updateAuthUI();
            connectWebSocket();
            await loadHistory();
        })();
    })();
</script>
</body>
    </html>
