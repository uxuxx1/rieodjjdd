<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>uxt canvas</title>
    <style>
        body { font-family: monospace; background: #ffffff; margin: 0; padding: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; user-select: none; }
        header { background: #ffffff; border-bottom: 1px solid #000000; padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; height: 45px; box-sizing: border-box; z-index: 10; }
        h1 { margin: 0; font-size: 14px; font-weight: normal; text-transform: lowercase; }
        
        .canvas-container { flex: 1; overflow: auto; background: #fafafa; position: relative; }
        
        .canvas-wrapper { 
            position: absolute;
            top: 20px;
            left: 20px;
            border: 2px solid #000000;
            width: 2500px;
            height: 2500px;
            background-image: 
                linear-gradient(to right, #e0e0e0 1px, transparent 1px),
                linear-gradient(to bottom, #e0e0e0 1px, transparent 1px);
            background-size: 5px 5px;
        }
        
        canvas { 
            display: block; 
            background: transparent; 
            image-rendering: pixelated; 
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }
        
        .controls-panel { background: #ffffff; border-top: 1px solid #000000; padding: 15px; display: flex; flex-direction: column; align-items: center; gap: 10px; height: 65px; box-sizing: border-box; z-index: 10; }
        .palette { display: flex; gap: 6px; }
        .color-box { width: 26px; height: 26px; border: 1px solid #000000; cursor: pointer; box-sizing: border-box; }
        .color-box.selected { outline: 2px solid #000000; outline-offset: 2px; transform: scale(1.05); }
        .status-text { font-size: 11px; color: #000000; text-transform: lowercase; }
    </style>
</head>
<body>

    <header>
        <h1>uxt canvas</h1>
        <div class="status-text" id="coords-display">x: 0, y: 0</div>
    </header>

    <div class="canvas-container">
        <div class="canvas-wrapper">
            <canvas id="paint-canvas" width="500" height="500"></canvas>
        </div>
    </div>

    <div class="controls-panel">
        <div class="palette" id="color-palette"></div>
    </div>

    <script>
        const endpoint = window.location.origin;
        const canvas = document.getElementById('paint-canvas');
        const ctx = canvas.getContext('2d');
        
        const colors = [
            '#ff0000', '#990000', '#ff7f00', '#994c00', '#ffff00', '#999900',
            '#00ff00', '#009900', '#0000ff', '#000099', '#4b0082', '#2e0051',
            '#8b00ff', '#550099', '#ffffff', '#000000'
        ];
        let activeColor = '#ff0000';

        function buildPalette() {
            const wrapper = document.getElementById('color-palette');
            wrapper.innerHTML = colors.map((c, i) => `
                <div class="color-box ${i === 0 ? 'selected' : ''}" 
                     style="background: ${c}" 
                     onclick="selectColor('${c}', this)">
                </div>
            `).join('');
        }

        function selectColor(color, element) {
            activeColor = color;
            document.querySelectorAll('.color-box').forEach(b => b.classList.remove('selected'));
            element.classList.add('selected');
        }

        async function syncEntireCanvas() {
            try {
                const res = await fetch(`${endpoint}/matrix`);
                const arrayBuffer = await res.arrayBuffer();
                const u8Array = new Uint8Array(arrayBuffer);
                
                const imgData = ctx.createImageData(500, 500);
                for (let i = 0; i < u8Array.length; i++) {
                    const colorIdx = u8Array[i];
                    const hex = colors[colorIdx];
                    const r = parseInt(hex.slice(1,3), 16);
                    const g = parseInt(hex.slice(3,5), 16);
                    const b = parseInt(hex.slice(5,7), 16);
                    
                    const p = i * 4;
                    imgData.data[p] = r;
                    imgData.data[p+1] = g;
                    imgData.data[p+2] = b;
                    imgData.data[p+3] = 255;
                }
                ctx.putImageData(imgData, 0, 0);
            } catch (e) {
                console.log('sync error');
            }
        }

        canvas.addEventListener('click', async (e) => {
            const rect = canvas.getBoundingClientRect();
            
            const x = Math.floor((e.clientX - rect.left) / (rect.width / 500));
            const y = Math.floor((e.clientY - rect.top) / (rect.height / 500));

            if (x >= 0 && x < 500 && y >= 0 && y < 500) {
                ctx.fillStyle = activeColor;
                ctx.fillRect(x, y, 1, 1);

                await fetch(`${endpoint}/draw`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ x, y, color: activeColor })
                });
            }
        });

        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            const x = Math.floor((e.clientX - rect.left) / (rect.width / 500));
            const y = Math.floor((e.clientY - rect.top) / (rect.height / 500));
            
            if (x >= 0 && x < 500 && y >= 0 && y < 500) {
                document.getElementById('coords-display').innerText = `x: ${x}, y: ${y}`;
            }
        });

        buildPalette();
        syncEntireCanvas();
        setInterval(syncEntireCanvas, 4000);
    </script>
</body>
</html>
